<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background (Transparent) -->
  <rect width="800" height="450" fill="transparent" />

  <!-- Title / Legend optional -->
  
  <!-- Lines/Arrows -->
  <!-- Chainlit to Backend (Query) -->
  <path d="M 230 110 L 350 110" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <text x="290" y="100" font-family="sans-serif" font-size="14" fill="#475569" text-anchor="middle" font-weight="500">User Query</text>

  <!-- Backend to Chainlit (Response) -->
  <path d="M 350 150 L 230 150" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <text x="290" y="170" font-family="sans-serif" font-size="14" fill="#475569" text-anchor="middle" font-weight="500">Recommendations</text>

  <!-- Backend to OpenAI -->
  <path d="M 430 180 L 250 280" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  
  <!-- Backend to Typesense -->
  <path d="M 430 180 L 430 280" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  
  <!-- Backend to MOTN -->
  <path d="M 430 180 L 610 280" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" />

  <!-- Node 1: Chainlit UI -->
  <g transform="translate(50, 90)">
    <rect width="180" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)" />
    <text x="90" y="35" font-family="sans-serif" font-size="16" fill="#0f172a" font-weight="bold" text-anchor="middle">Chainlit UI</text>
    <text x="90" y="55" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">(Frontend)</text>
  </g>

  <!-- Node 2: App Backend -->
  <g transform="translate(350, 90)">
    <rect width="160" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)" />
    <text x="80" y="35" font-family="sans-serif" font-size="16" fill="#0f172a" font-weight="bold" text-anchor="middle">App Backend</text>
    <text x="80" y="55" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">(Python)</text>
    <text x="80" y="75" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">LangChain</text>
  </g>

  <!-- Node 3: OpenAI -->
  <g transform="translate(150, 280)">
    <rect width="180" height="90" rx="8" fill="#f0fdf4" stroke="#10a37f" stroke-width="2" filter="url(#shadow)" />
    <text x="90" y="35" font-family="sans-serif" font-size="16" fill="#065f46" font-weight="bold" text-anchor="middle">OpenAI API</text>
    <text x="90" y="55" font-family="sans-serif" font-size="14" fill="#166534" text-anchor="middle">LLM &amp; Embeddings</text>
    <text x="90" y="75" font-family="sans-serif" font-size="14" fill="#166534" text-anchor="middle">Query Parsing</text>
  </g>

  <!-- Node 4: Typesense -->
  <g transform="translate(350, 280)">
    <rect width="160" height="90" rx="8" fill="#fdf2f8" stroke="#d52b7f" stroke-width="2" filter="url(#shadow)" />
    <text x="80" y="35" font-family="sans-serif" font-size="16" fill="#831843" font-weight="bold" text-anchor="middle">Typesense</text>
    <text x="80" y="55" font-family="sans-serif" font-size="14" fill="#9d174d" text-anchor="middle">Vector Database</text>
    <text x="80" y="75" font-family="sans-serif" font-size="14" fill="#9d174d" text-anchor="middle">&amp; Hybrid Search</text>
  </g>

  <!-- Node 5: MOTN API -->
  <g transform="translate(530, 280)">
    <rect width="160" height="90" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)" />
    <text x="80" y="35" font-family="sans-serif" font-size="14" fill="#075985" font-weight="bold" text-anchor="middle">Movie of the Night</text>
    <text x="80" y="55" font-family="sans-serif" font-size="14" fill="#0369a1" text-anchor="middle">Streaming Info</text>
    <text x="80" y="75" font-family="sans-serif" font-size="14" fill="#0369a1" text-anchor="middle">&amp; Posters</text>
  </g>

</svg>
